<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | PipaliyaPlates — India's Premium Food Delivery</title>
  <meta name="description"
    content="Login to PipaliyaPlates and order delicious food from 8 cuisines delivered to your doorstep." />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="auth-page">

    <!-- Left Visual -->
    <div class="auth-visual">
      <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=900&q=80"
        alt="Delicious food" />
      <div class="auth-visual-overlay">
        <h2>Crave.<br>Click.<br>Eat.</h2>
        <p>25+ dishes · 8 cuisines · 30-min delivery</p>
      </div>
    </div>

    <!-- Right Form Side -->
    <div class="auth-side">
      <a href="login.html" class="auth-logo-top">
        <div class="logo-icon">🍕</div>
        <span class="logo-text">Pipaliya<span style="color:var(--primary)">Plates</span></span>
      </a>

      <h1 class="auth-form-title">Welcome back!</h1>
      <p class="auth-form-sub">Sign in to continue your food journey 🚀</p>

      <form onsubmit="handleLogin(event); return false;">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrap">
            <input type="password" id="password" required placeholder="Enter your password" />
            <button type="button" class="input-icon" onclick="togglePassword()" title="Toggle password"
              id="eye-btn">👁️</button>
          </div>
        </div>

        <button type="submit" class="auth-submit-btn" id="login-btn">
          Sign In →
        </button>
      </form>

      <div class="auth-links">
        <p>Don't have an account? <a href="register.html">Create one free</a></p>
        <p><a href="forgot.html">Forgot your password?</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return;

      const btn = document.getElementById('login-btn');
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      setTimeout(() => {
        // Default hardcoded user
        if (email === 'hardik@gmail.com' && password === 'Hardik@2005') {
          sessionStorage.setItem('isLoggedIn', 'true');
          sessionStorage.setItem('userEmail', email);
          sessionStorage.setItem('userName', 'Hardik Pipaliya');
          showToast('Login Successful! Welcome back 🎉', 'success');
          setTimeout(() => window.location.href = 'index.html', 800);
          return;
        }

        // localStorage registered users
        const users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
        const found = users.find(u => u.email === email && u.password === password);
        if (found) {
          sessionStorage.setItem('isLoggedIn', 'true');
          sessionStorage.setItem('userEmail', email);
          sessionStorage.setItem('userName', found.name || '');
          showToast('Login Successful! Welcome back 🎉', 'success');
          setTimeout(() => window.location.href = 'index.html', 800);
        } else {
          showToast('Invalid email or password!', 'error');
          btn.textContent = 'Sign In →';
          btn.disabled = false;
        }
      }, 600);
    }

    function togglePassword() {
      const f = document.getElementById('password');
      const b = document.getElementById('eye-btn');
      if (f.type === 'password') { f.type = 'text'; b.textContent = '🙈'; }
      else { f.type = 'password'; b.textContent = '👁️'; }
    }
  </script>
</body>

</html>
