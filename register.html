<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | PipaliyaPlates</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-cream);
      padding-bottom: 60px;
    }
    .auth-logo {
      margin-top: 40px;
      margin-bottom: 10px;
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--poy-plum);
    }
    .auth-logo a { color: inherit; text-decoration: none; }
    .auth-title {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 1.7rem;
      color: var(--poy-plum);
      margin-bottom: 0;
      text-align: center;
    }
    .password-container {
      display: flex;
      position: relative;
      align-items: center;
      margin-bottom: 18px;
    }
    .password-container input {
      width: 100%;
      margin-bottom: 0;
      padding-right: 50px;
    }
    .toggle-password {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--poy-plum);
      padding: 4px;
      transform: none !important;
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-logo"><a href="index.html">PipaliyaPlates 🍕</a></div>
    <p class="auth-title">Create Account</p>

    <form class="register-form" onsubmit="handleRegister(event); return false;">
      <label for="name">Full Name</label>
      <input type="text" id="name" required placeholder="Enter your full name">

      <label for="email">Email Address</label>
      <input type="email" id="email" required placeholder="Enter your email">

      <label for="password">Password</label>
      <div class="password-container">
        <input type="password" id="password" required placeholder="Create a password">
        <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
      </div>

      <button type="submit">Register</button>

      <div class="extra-links">
        <p>Already have an account? <a href="login.html">Login</a></p>
      </div>
    </form>
  </div>

  <footer class="main-footer">
    <span class="footer-brand">PipaliyaPlates 🍕</span>
    <p>&copy; 2025 PipaliyaPlates. All Rights Reserved.</p>
    <nav class="footer-nav">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </footer>

  <script>
    function handleRegister(event) {
      event.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !email || !password) return;

      let users = JSON.parse(localStorage.getItem("registeredUsers")) || [];
      if (users.some(u => u.email === email)) {
        alert("An account with this email already exists!");
        return;
      }

      users.push({ name, email, password, registeredAt: new Date().toISOString() });
      localStorage.setItem("registeredUsers", JSON.stringify(users));
      alert("Registration Successful! Please login.");
      window.location.href = "login.html";
    }

    function togglePassword() {
      const f = document.getElementById('password');
      const b = document.querySelector('.toggle-password');
      if (f.type === 'password') { f.type = 'text'; b.textContent = '🙈'; }
      else { f.type = 'password'; b.textContent = '👁️'; }
    }
  </script>
</body>
</html>
