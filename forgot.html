<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | PipaliyaPlates</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="auth-page">

    <!-- Left Visual -->
    <div class="auth-visual">
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=900&q=80"
        alt="Food" />
      <div class="auth-visual-overlay">
        <h2>Don't<br>Worry!</h2>
        <p>We'll get you back in no time 🔑</p>
      </div>
    </div>

    <!-- Right -->
    <div class="auth-side">
      <a href="login.html" class="auth-logo-top">
        <div class="logo-icon">🍕</div>
        <span class="logo-text">Pipaliya<span style="color:var(--primary)">Plates</span></span>
      </a>

      <h1 class="auth-form-title">Forgot Password?</h1>
      <p class="auth-form-sub">Enter your email and we'll send a reset link.</p>

      <form onsubmit="handleForgot(event); return false;">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com" />
        </div>
        <button type="submit" class="auth-submit-btn" id="forgot-btn">
          Send Reset Link →
        </button>
      </form>

      <div class="auth-links">
        <p><a href="login.html">← Back to Login</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function handleForgot(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return;

      const btn = document.getElementById('forgot-btn');
      btn.textContent = 'Sending…';
      btn.disabled = true;

      setTimeout(() => {
        showToast(`Reset link sent to ${email}! Check your inbox 📧`, 'success', 4000);
        btn.textContent = 'Send Reset Link →';
        btn.disabled = false;
        document.getElementById('email').value = '';
      }, 1000);
    }
  </script>
</body>

</html>
