<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | PipaliyaPlates — Create Your Account</title>
  <meta name="description" content="Create your free PipaliyaPlates account and start ordering delicious food today." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="auth-page">

    <!-- Left Visual -->
    <div class="auth-visual">
      <img
        src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=900&q=80"
        alt="Delicious food spread"
      />
      <div class="auth-visual-overlay">
        <h2>Join the<br>Food<br>Revolution.</h2>
        <p>1200+ happy foodies · Free delivery on ₹500+</p>
      </div>
    </div>

    <!-- Right Form -->
    <div class="auth-side">
      <a href="login.html" class="auth-logo-top">
        <div class="logo-icon">🍕</div>
        <span class="logo-text">Pipaliya<span style="color:var(--primary)">Plates</span></span>
      </a>

      <h1 class="auth-form-title">Create Account</h1>
      <p class="auth-form-sub">It's free! Start ordering in 60 seconds 🍽️</p>

      <form onsubmit="handleRegister(event); return false;">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required placeholder="e.g. Hardik Pipaliya" />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrap">
            <input type="password" id="password" required placeholder="Create a strong password" />
            <button type="button" class="input-icon" onclick="togglePwd()" id="eye-btn">👁️</button>
          </div>
        </div>

        <button type="submit" class="auth-submit-btn" id="reg-btn">
          Create Account →
        </button>
      </form>

      <div class="auth-links">
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function handleRegister(event) {
      event.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !email || !password) return;

      if (password.length < 6) {
        showToast('Password must be at least 6 characters!', 'error');
        return;
      }

      const btn = document.getElementById('reg-btn');
      btn.textContent = 'Creating account…';
      btn.disabled = true;

      setTimeout(() => {
        let users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
        if (users.some(u => u.email === email)) {
          showToast('An account with this email already exists!', 'error');
          btn.textContent = 'Create Account →';
          btn.disabled = false;
          return;
        }

        users.push({ name, email, password, registeredAt: new Date().toISOString() });
        localStorage.setItem('registeredUsers', JSON.stringify(users));
        showToast('Account created! Please login 🎉', 'success');
        setTimeout(() => window.location.href = 'login.html', 1000);
      }, 600);
    }

    function togglePwd() {
      const f = document.getElementById('password');
      const b = document.getElementById('eye-btn');
      if (f.type === 'password') { f.type = 'text';     b.textContent = '🙈'; }
      else                       { f.type = 'password'; b.textContent = '👁️'; }
    }
  </script>
</body>
</html>
