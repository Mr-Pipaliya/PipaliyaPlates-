<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | PipaliyaPlates</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-cream);
      padding-bottom: 60px;
    }
    .auth-logo {
      margin-top: 40px;
      margin-bottom: 10px;
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--poy-plum);
    }
    .auth-logo a { color: inherit; text-decoration: none; }
    .auth-title {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 1.7rem;
      color: var(--poy-plum);
      margin-bottom: 0;
      text-align: center;
    }
    .password-container {
      display: flex;
      position: relative;
      align-items: center;
      margin-bottom: 18px;
    }
    .password-container input[type="password"],
    .password-container input[type="text"] {
      width: 100%;
      margin-bottom: 0;
      padding-right: 50px;
    }
    .toggle-password {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--poy-plum);
      padding: 4px;
      transform: none !important;
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-logo"><a href="index.html">PipaliyaPlates 🍕</a></div>
    <p class="auth-title">Welcome Back</p>

    <form class="login-form" onsubmit="handleLogin(event); return false;">
      <label for="email">Email Address</label>
      <input type="email" id="email" required placeholder="example@mail.com">

      <label for="password">Password</label>
      <div class="password-container">
        <input type="password" id="password" required placeholder="Enter your password">
        <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
      </div>

      <button type="submit">Login</button>

      <div class="extra-links">
        <p>Don't have an account? <a href="register.html">Register</a></p>
        <p><a href="forgot.html">Forgot Password?</a></p>
      </div>
    </form>
  </div>

  <footer class="main-footer">
    <span class="footer-brand">PipaliyaPlates 🍕</span>
    <p>&copy; 2025 PipaliyaPlates. All Rights Reserved.</p>
    <nav class="footer-nav">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </footer>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return;

      // Default hardcoded user
      if (email === 'hardik@gmail.com' && password === 'Hardik@2005') {
        sessionStorage.setItem("isLoggedIn", "true");
        sessionStorage.setItem("userEmail",  email);
        sessionStorage.setItem("userName",   "Hardik Pipaliya");
        alert("Login Successful!");
        window.location.href = "index.html";
        return;
      }

      // localStorage registered users
      const users = JSON.parse(localStorage.getItem("registeredUsers")) || [];
      const found = users.find(u => u.email === email && u.password === password);
      if (found) {
        sessionStorage.setItem("isLoggedIn", "true");
        sessionStorage.setItem("userEmail",  email);
        sessionStorage.setItem("userName",   found.name || '');
        alert("Login Successful!");
        window.location.href = "index.html";
      } else {
        alert("Invalid email or password!");
      }
    }

    function togglePassword() {
      const f = document.getElementById('password');
      f.type = f.type === "password" ? "text" : "password";
    }
  </script>
</body>
</html>
