<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password | PipaliyaPlates</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-cream);
      padding-bottom: 60px;
    }
    .auth-logo {
      margin-top: 40px;
      margin-bottom: 10px;
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--poy-plum);
    }
    .auth-logo a { color: inherit; text-decoration: none; }
    .auth-title {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 1.7rem;
      color: var(--poy-plum);
      margin-bottom: 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-logo"><a href="index.html">PipaliyaPlates 🍕</a></div>
    <p class="auth-title">Reset Password</p>

    <form class="forgot-form" onsubmit="return handleForgot(event)">
      <label for="forgot-email">Enter your email to receive a reset link</label>
      <input type="email" id="forgot-email" name="forgot-email" required placeholder="Enter your email">

      <button type="submit">Send Reset Link</button>

      <div class="extra-links">
        <p><a href="login.html">← Back to Login</a></p>
      </div>
    </form>
  </div>

  <footer class="main-footer">
    <span class="footer-brand">PipaliyaPlates 🍕</span>
    <p>&copy; 2025 PipaliyaPlates. All Rights Reserved.</p>
    <nav class="footer-nav">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </footer>

  <script>
    function handleForgot(event) {
      event.preventDefault();
      alert('Reset link sent to your email!');
      window.location.href = "login.html";
      return false;
    }
  </script>
</body>
</html>
