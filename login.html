<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | PipaliyaPlates</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Only functional overrides — all design comes from style.css */
    .auth-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-cream);
      padding-bottom: 60px;
    }
    .auth-logo {
      margin-top: 40px;
      margin-bottom: 10px;
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--poy-plum);
    }
    .auth-logo a { color: inherit; text-decoration: none; }
    .auth-title {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 1.7rem;
      color: var(--poy-plum);
      margin-bottom: 0;
      text-align: center;
    }
    .password-container {
      display: flex;
      position: relative;
      align-items: center;
      margin-bottom: 18px;
    }
    .password-container input[type="password"],
    .password-container input[type="text"] {
      width: 100%;
      margin-bottom: 0;
      padding-right: 50px;
    }
    .toggle-password {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--poy-plum);
      padding: 4px;
      transform: none !important;
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-logo"><a href="index.html">PipaliyaPlates 🍕</a></div>
    <p class="auth-title">Welcome Back</p>

    <form class="login-form" onsubmit="return handleLogin(event)">
      <label for="email">Email Address</label>
      <input type="email" id="email" required placeholder="example@mail.com">

      <label for="password">Password</label>
      <div class="password-container">
        <input type="password" id="password" required placeholder="Enter your password">
        <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
      </div>

      <button type="submit">Login</button>

      <div class="extra-links">
        <p>Don't have an account? <a href="register.html">Register</a></p>
        <p><a href="forgot.html">Forgot Password?</a></p>
      </div>
    </form>
  </div>

  <footer class="main-footer">
    <span class="footer-brand">PipaliyaPlates 🍕</span>
    <p>&copy; 2025 PipaliyaPlates. All Rights Reserved.</p>
    <nav class="footer-nav">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </footer>

  <script>
    // ── Detect if running locally (server available) or on Vercel ──
    const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    const SERVER   = 'http://localhost:5000';

    // Notify server terminal (only when local) with 3s timeout
    async function notifyServer(endpoint, data) {
      if (!IS_LOCAL) return; // Skip entirely on Vercel
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 3000); // 3s max
        await fetch(SERVER + endpoint, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(data),
          signal:  ctrl.signal
        });
        clearTimeout(timer);
      } catch (_) { /* server offline — silently ignore */ }
    }

    async function handleLogin(event) {
      event.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return;

      // ── 1. Try server (only on localhost) ──
      if (IS_LOCAL) {
        try {
          const ctrl = new AbortController();
          setTimeout(() => ctrl.abort(), 3000); // 3s timeout — no hang
          const response = await fetch(SERVER + '/api/login', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ email, password }),
            signal:  ctrl.signal
          });
          if (response.ok) {
            const data = await response.json();
            sessionStorage.setItem("isLoggedIn", "true");
            sessionStorage.setItem("userEmail",  email);
            if (data.name) sessionStorage.setItem("userName", data.name);
            alert("Login Successful!");
            window.location.href = "index.html";
            return;
          } else if (response.status === 401) {
            // Notify terminal already done server-side
            await notifyServer('/api/login', { email, password, name: '', success: false });
            alert("Invalid email or password!");
            return;
          }
        } catch (_) {
          // Server not running — fall through to local checks
        }
      }

      // ── 2. Default hardcoded credentials ──
      if (email === 'hardik@gmail.com' && password === 'Hardik@2005') {
        await notifyServer('/api/login', { email, password, name: 'Hardik Pipaliya', success: true });
        sessionStorage.setItem("isLoggedIn", "true");
        sessionStorage.setItem("userEmail",  email);
        sessionStorage.setItem("userName",   "Hardik Pipaliya");
        alert("Login Successful!");
        window.location.href = "index.html";
        return;
      }

      // ── 3. localStorage registered users ──
      const registeredUsers = JSON.parse(localStorage.getItem("registeredUsers")) || [];
      const matchedUser = registeredUsers.find(u => u.email === email && u.password === password);
      if (matchedUser) {
        await notifyServer('/api/login', { email, password, name: matchedUser.name, success: true });
        sessionStorage.setItem("isLoggedIn", "true");
        sessionStorage.setItem("userEmail",  email);
        sessionStorage.setItem("userName",   matchedUser.name || '');
        alert("Login Successful!");
        window.location.href = "index.html";
      } else {
        await notifyServer('/api/login', { email, password, name: '', success: false });
        alert("Invalid email or password!");
      }
    }

    function togglePassword() {
      const passField = document.getElementById('password');
      passField.type = (passField.type === "password") ? "text" : "password";
    }
  </script>
</body>
</html>
